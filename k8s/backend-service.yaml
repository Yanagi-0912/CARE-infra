# Service：在 Kubernetes 中提供穩定的網路端點
#
# Service 的作用：
#   1. 提供穩定 IP 和 DNS 名稱（Pod IP 會變動，Service IP 不變）
#   2. 負載均衡：自動將流量分配給多個 Pod
#   3. 發現服務：在叢集內，其他 Pod 可透過 Service 名稱和命名空間訪問
#
# ClusterIP 類型：
#   - 只在叢集內部可訪問
#   - 無法從叢集外部訪問（需要 Ingress 或 NodePort）
#   - 最安全的選擇（推薦用於生產）
#
# 修改指南：
#   - port：叢集內訪問的埠（例如：curl care-backend:8000）
#   - targetPort：轉發到 Pod 容器的埠

apiVersion: v1
kind: Service
metadata:
  name: care-backend
  namespace: care-dev
  labels:
    app: care-backend
spec:
  type: ClusterIP  # 服務類型：只在叢集內可訪問
  
  # 選取 Deployment 中定義的 Pod
  selector:
    app: care-backend
  
  # 埠映射
  ports:
    - name: http
      port: 8000        # 叢集內其他 Pod 透過 care-backend:8000 訪問
      targetPort: 8000  # 轉發到容器的 8000 埠
