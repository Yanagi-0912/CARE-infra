# Secret 資源定義：存放敏感資訊（API keys、密碼等）
# 
# ⚠️  安全提醒：
#   1. 這份檔案是「範本」，請勿填入真實金鑰並提交到 git！
#   2. 本機開發時，請使用 secret.local.yaml（已在 .gitignore 中）
#   3. 正式環境應透過 CI 或 kubectl 命令注入真值
#   4. Secret 在 etcd 中預設為 Base64 編碼（不加密），請啟用 etcd encryption
#
# 部署方式選項：
#   方案 A（CI 注入）: kubectl create secret generic care-backend-secret \
#                       --from-literal=GEMINI_API_KEY=xxx \
#                       --from-literal=MONGODB_URI=xxx ...
#   方案 B（本機測試）: kubectl apply -f secret.local.yaml
#   方案 C（生產推薦）: 使用 Sealed Secrets 或 ExternalSecrets

apiVersion: v1
kind: Secret
metadata:
  name: care-backend-secret
  namespace: care-dev
type: Opaque
stringData:
  # Gemini API 與模型設定
  GEMINI_API_KEY: "your_gemini_api_key_here"

  # LINE Bot 相關憑證
  LINE_CHANNEL_ID: "your_line_channel_id"
  LINE_CHANNEL_SECRET: "your_line_channel_secret"
  LINE_CHANNEL_ACCESS_TOKEN: "your_line_channel_access_token"

  # MongoDB 連線與向量搜尋欄位設定
  MONGODB_URI: "your_mongodb_uri_here"

  # LINE LIFF 相關憑證
  LIFF_CHANNEL_ID: "your_liff_channel_id"
  LIFF_CHANNEL_SECRET: "your_liff_channel_secret"
  LIFF_ID: "your_liff_id"
