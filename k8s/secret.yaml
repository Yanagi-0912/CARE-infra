# 為什麼 .env 有了還要 Secret？
# .env 通常只用在本機開發（docker compose、local run），不會自動進入 K8s Pod。
# 在 Kubernetes 叢集內，設定值需要由叢集資源提供，標準做法是使用 Secret / ConfigMap。
# 這份檔案是「範本」，請勿填入真實金鑰並提交到 git。
# 正式環境請以 CI、`kubectl create secret ... --from-env-file` 等方式注入真值。
# Secret：集中管理後端需要的敏感設定，供 Deployment 以環境變數載入。
apiVersion: v1
kind: Secret
metadata:
  name: care-backend-secret
  namespace: care-dev
type: Opaque
stringData:
  # Gemini API 與模型設定
  GEMINI_API_KEY: "your_gemini_api_key_here"

  # LINE Bot 相關憑證
  LINE_CHANNEL_ID: "your_line_channel_id"
  LINE_CHANNEL_SECRET: "your_line_channel_secret"
  LINE_CHANNEL_ACCESS_TOKEN: "your_line_channel_access_token"

  # MongoDB 連線與向量搜尋欄位設定
  MONGODB_URI: "your_mongodb_uri_here"

  # LINE LIFF 相關憑證
  LIFF_CHANNEL_ID: "your_liff_channel_id"
  LIFF_CHANNEL_SECRET: "your_liff_channel_secret"
  LIFF_ID: "your_liff_id"
