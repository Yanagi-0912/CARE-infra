# Ingress：由 NGINX Ingress Controller 解析規則，轉發到 care-backend Service。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: care-backend
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: care-backend
                port:
                  number: 8000
