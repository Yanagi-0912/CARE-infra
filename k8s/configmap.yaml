# ConfigMap：存放非敏感的應用配置
# 與 Secret 不同，ConfigMap 用於一般的配置值（不是敏感資訊）
# 這些值會作為環境變數注入到後端 Pod 中

apiVersion: v1
kind: ConfigMap
metadata:
  name: care-backend-config
  namespace: care-dev
data:
  # ===== Gemini AI 模型設定 =====
  # 使用 Google Gemini 模型進行 AI 推理和文本生成
  MODEL_NAME: "gemini-2.5-flash"              # AI 推理用的主模型
  EMBEDDING_MODEL: "gemini-embedding-001"    # 用於生成向量的模型（用在向量搜索）

  # ===== LINE 平台設定 =====
  # LIFF URL：LINE Front-end Framework 的應用連結
  # 用戶掃 QR code 或點擊連結時會打開這個 URL
  LIFF_URL: "https://liff.line.me/2009177739-JJrPzjAn"

  # ===== MongoDB 資料庫設定 =====
  # 存儲健康知識文章、向量數據等
  MONGODB_DB: "CARE_database"                 # 資料庫名稱
  MONGODB_COLLECTION: "health_articles_chunks"  # 收集（集合）名稱
  
  # 向量搜索配置（用於語義搜索）
  MONGODB_VECTOR_INDEX: "vector_index"        # MongoDB 中的向量索引名稱
  MONGODB_VECTOR_FIELD: "embedding"           # 存儲向量的欄位名稱
  MONGODB_TEXT_FIELD: "text"                  # 存儲文本的欄位名稱
  MONGODB_VECTOR_DIM: "3072"                  # 向量維度（Gemini embedding 的維度）

  # ===== Webhook 設定 =====
  # 用於接收外部媒體解析服務的回調
  MEDIA_PARSE_WEBHOOK_URL: "media_parse_webhook_url_here"

  # ===== CORS 設定 =====
  # CORS（Cross-Origin Resource Sharing）允許前端從指定的來源訪問 API
  # 修改為你的實際 frontend URL 或 IP（例如：http://localhost:3000 或 https://example.com）
  # ⚠️  生產環境：請勿使用 * 通配符，應指定具體的允許來源
  CORS_ALLOW_ORIGINS: "http://140.121.196.16"