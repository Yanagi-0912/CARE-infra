apiVersion: v1
kind: ConfigMap
metadata:
  name: care-backend-config
  namespace: care-dev
data:
  MODEL_NAME: "gemini-2.5-flash"
  EMBEDDING_MODEL: "gemini-embedding-001"
  # 請在部署時以實際 LIFF URL 取代下列值（可透過 kustomize overlay 或 CI 注入）
  LIFF_URL: "REPLACE_WITH_LIFF_URL"
  MONGODB_DB: "CARE_database"
  MONGODB_COLLECTION: "health_articles_chunks"
  MONGODB_VECTOR_INDEX: "vector_index"
  MONGODB_VECTOR_FIELD: "embedding"
  MONGODB_TEXT_FIELD: "text"
  MONGODB_VECTOR_DIM: "3072"
  MEDIA_PARSE_WEBHOOK_URL: "media_parse_webhook_url_here"
  # 請在不同環境中替換允許的 origin，避免使用通配符 *
  CORS_ALLOW_ORIGINS: "REPLACE_WITH_ALLOWED_ORIGIN"