# Deployment：負責建立並維持 FastAPI 後端的 Pod 數量與版本。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: care-backend
  namespace: care-dev
  labels:
    app: care-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: care-backend
  template:
    metadata:
      labels:
        app: care-backend
    spec:
      automountServiceAccountToken: false
      containers:
        - name: care-backend
          image: yanagi0912/care-backend:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          envFrom:
            - configMapRef:
                name: care-backend-config
            - secretRef:
                name: care-backend-secret
