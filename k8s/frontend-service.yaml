# Service：提供穩定的網路端點，讓叢集內其他資源訪問前端
#
# 前端 Service 的特點：
#   - 埠為 80（HTTP）
#   - 選取前端 Deployment 的 Pod
#   - 透過 Ingress 將外部流量導到此 Service

apiVersion: v1
kind: Service
metadata:
  name: care-frontend
  namespace: care-dev
  labels:
    app: care-frontend
spec:
  type: ClusterIP
  selector:
    app: care-frontend
  ports:
    - name: http
      port: 80          # 叢集內透過 care-frontend:80 訪問
      targetPort: 80    # 轉發到容器的 80 埠
