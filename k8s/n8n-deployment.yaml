# n8n Deployment：自動化工作流程引擎
#
# n8n 的作用：
#   - 視覺化工作流程設計器（類似 Zapier、Make）
#   - 整合各種第三方 API 和服務
#   - 在 CARE 應用中用於媒體解析、資料處理等自動化任務
#
# n8n 配置說明：
#   - 持久化儲存（PVC）：保存工作流程定義和執行記錄
#   - 環境變數：控制 n8n 的運行方式、URL、日誌級別等
#
# 修改指南：
#   - N8N_HOST：改為你的實際 domain 或 IP（會影響 webhook URL）
#   - GENERIC_TIMEZONE：改為你的時區（目前為台灣時區）
#   - memory/cpu：根據工作流程複雜度調整

apiVersion: apps/v1
kind: Deployment
metadata:
  name: care-n8n
  namespace: care-dev
  labels:
    app: n8n
spec:
  replicas: 1  # n8n 不支援多個副本共用同一個 database，請保持為 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      automountServiceAccountToken: false
      containers:
        - name: n8n
          
          # n8n 官方映像
          image: n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          
          # n8n 暴露的埠
          ports:
            - containerPort: 8100
          
          # n8n 環境變數設定
          env:
            # 基本配置
            - name: N8N_PORT
              value: "8100"  # n8n web server 監聽埠
            
            - name: N8N_PATH
              value: /n8n/   # n8n web 應用的路由前綴（透過 Ingress 暴露）
            
            - name: N8N_PROTOCOL
              value: http    # 協議（http 或 https）
            
            # ⚠️  需要修改的項目：
            # N8N_HOST 用於生成 webhook URL，如果改變會影響已創建的 webhook
            # 修改前請備份 n8n 資料或重新創建工作流程
            - name: N8N_HOST
              value: "140.121.196.16"  # 改為你的實際域名或 IP
            
            - name: N8N_EDITOR_BASE_URL
              value: "http://140.121.196.16/n8n/"  # n8n UI 的外部訪問 URL
            
            - name: WEBHOOK_URL
              value: "http://140.121.196.16/n8n/"  # Webhook 回調基礎 URL
            
            # 時區設定
            - name: GENERIC_TIMEZONE
              value: Asia/Taipei  # 改為你的時區
            
            # 安全設定
            - name: N8N_SECURE_COOKIE
              value: "false"  # 開發環境設為 false；生產環境使用 HTTPS 時改為 true
          
          # 掛載持久化儲存
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n  # n8n 保存資料的目錄
          
          # 從 ConfigMap 載入環境變數
          envFrom:
            - configMapRef:
                name: n8n-config
          
          # 資源限制
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: 1000m        # n8n 可以相當耗 CPU（複雜工作流程）
              memory: 1Gi       # 記憶體用於儲存工作流程和執行狀態
              ephemeral-storage: 1Gi
      
      # 卷定義：連接 PVC 到容器
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data  # 參考上面定義的 PVC