apiVersion: apps/v1
kind: Deployment
metadata:
  name: care-n8n
  namespace: care-dev
  labels:
    app: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      automountServiceAccountToken: false
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
          env:
            - name: N8N_PORT
              value: "8100"
            - name: N8N_PATH
              value: /n8n/
            - name: N8N_PROTOCOL
              value: http
            - name: N8N_HOST
              # 請在 overlay 或 CI 以 kustomize/環境變數替換為實際的 ingress host
              value: REPLACE_WITH_INGRESS_HOST
            - name: N8N_EDITOR_BASE_URL
              value: http://REPLACE_WITH_INGRESS_HOST/n8n/
            - name: WEBHOOK_URL
              value: http://REPLACE_WITH_INGRESS_HOST/n8n/
            - name: GENERIC_TIMEZONE
              value: Asia/Taipei
            - name: N8N_SECURE_COOKIE
              value: "false"
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          envFrom:
            - configMapRef:
                name: n8n-config
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 1Gi
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data