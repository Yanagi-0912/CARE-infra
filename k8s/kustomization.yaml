# Kustomization.yaml: 這是 Kubernetes Kustomize 的配置文件
# 作用：集中管理所有 K8s 資源，包括 deployments、services、configmaps 等
# Kustomize 是 kubectl 內建的資源管理工具，能夠組織和變換 K8s manifests

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# namespace: 所有資源都會被部署到 care-dev 命名空間
# 命名空間用於隔離不同應用或環境的資源
namespace: care-dev

# resources: 列出所有要被 Kustomize 包含的資源檔案
# 執行 `kubectl apply -k k8s` 時，會依序應用這些檔案中定義的所有資源
resources:
  # 1. 建立命名空間本身
  - namespace.yaml
  # 2. 建立敏感資訊 secret（API keys、DB 連線字串等）
  - secret.yaml
  # 3. 建立後端應用的環境變數配置
  - configmap.yaml
  # 4. 建立 n8n 應用的環境變數配置
  - n8n-configmap.yaml
  # 5. 建立後端應用的 Deployment（管理 Pod 副本）
  - backend-deployment.yaml
  # 6. 建立後端應用的 Service（提供穩定的網路端點）
  - backend-service.yaml
  # 7. 建立前端應用的 Deployment
  - frontend-deployment.yaml
  # 8. 建立前端應用的 Service
  - frontend-service.yaml
  # 9. 建立 n8n 應用的持久化儲存聲明
  - n8n-pvc.yaml
  # 10. 建立 n8n 應用的 Deployment
  - n8n-deployment.yaml
  # 11. 建立 n8n 應用的 Service
  - n8n-service.yaml
  # 12. 建立 Ingress 路由規則（將外部流量導到各個 Service）
  - ingress.yaml

# images: 定義容器映像的名稱（不包含 tag）
# CI 流程會自動使用 `kustomize edit set image` 命令更新 tag
# 這樣做的好處是 repo 中保持簡潔，具體 tag 由 CI 注入
images:
  - name: yanagi0912/care-backend
  - name: yanagi0912/care-frontend
  - name: n8nio/n8n