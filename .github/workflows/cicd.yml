name: care-app-build-push-deploy

on:
  push:
    branches:
      - main
      - feature/*
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      custom_tag:
        description: "Custom image tag (optional, e.g., v1.0.0)"
        required: false
        default: ""

env:
  K8S_DIR: k8s
  KUBE_NAMESPACE: care-dev
  BACKEND_IMAGE: yanagi0912/care-backend
  FRONTEND_IMAGE: yanagi0912/care-frontend
  N8N_IMAGE: n8nio/n8n

permissions:
  contents: read

jobs:
  generate-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      short_sha: ${{ steps.tag.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.custom_tag }}" ]; then
            TAG="${{ github.event.inputs.custom_tag }}"
          else
            TAG="${{ github.run_number }}-${SHORT_SHA}"
          fi
          
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

  build-backend:
    needs: generate-tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./CARE
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ needs.generate-tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    needs: generate-tag
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./CARE-LIFF
          build-args: |
            VITE_LIFF_ID=${{ secrets.VITE_LIFF_ID }}
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ needs.generate-tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Validate manifests
        working-directory: CARE-infra/k8s
        run: |
          kustomize build . > ../../rendered.yaml
          kubectl apply --dry-run=client --validate=false -f ../../rendered.yaml

  deploy:
    needs:
      - generate-tag
      - build-backend
      - build-frontend
      - validate
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Load kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo '${{ secrets.KUBE_CONFIG_DATA }}' | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Create k8s Secret
        run: |
          kubectl create secret generic care-backend-secret \
            --from-literal=GEMINI_API_KEY='${{ secrets.GEMINI_API_KEY }}' \
            --from-literal=MONGODB_URI='${{ secrets.MONGODB_URI }}' \
            --from-literal=LINE_CHANNEL_ID='${{ secrets.LINE_CHANNEL_ID }}' \
            --from-literal=LINE_CHANNEL_SECRET='${{ secrets.LINE_CHANNEL_SECRET }}' \
            --from-literal=LINE_CHANNEL_ACCESS_TOKEN='${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}' \
            --from-literal=LIFF_CHANNEL_ID='${{ secrets.LIFF_CHANNEL_ID }}' \
            --from-literal=LIFF_CHANNEL_SECRET='${{ secrets.LIFF_CHANNEL_SECRET }}' \
            --from-literal=LIFF_ID='${{ secrets.LIFF_ID }}' \
            -n care-dev --dry-run=client -o yaml | kubectl apply -f - || true


      - name: Update kustomization images
        working-directory: CARE-infra/k8s
        run: |
          kustomize edit set image \
            ${{ env.BACKEND_IMAGE }}=${{ env.BACKEND_IMAGE }}:${{ needs.generate-tag.outputs.tag }} \
            ${{ env.FRONTEND_IMAGE }}=${{ env.FRONTEND_IMAGE }}:${{ needs.generate-tag.outputs.tag }}

      - name: Apply manifests
        run: kubectl apply -k CARE-infra/k8s

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/care-backend -n "$KUBE_NAMESPACE" --timeout=5m
          kubectl rollout status deployment/care-frontend -n "$KUBE_NAMESPACE" --timeout=5m
          kubectl rollout status deployment/care-n8n -n "$KUBE_NAMESPACE" --timeout=5m

      - name: Print deployment info
        run: |
          echo "=== Deployment Complete ==="
          echo "Image tag: ${{ needs.generate-tag.outputs.tag }}"
          echo "Services:"
          kubectl get svc -n "$KUBE_NAMESPACE"