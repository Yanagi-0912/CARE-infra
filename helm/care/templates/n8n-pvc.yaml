{{- if .Values.n8n.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: n8n-data
  namespace: {{ include "care.namespace" . }}
  labels:
    {{- include "care.n8n.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.n8n.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.n8n.persistence.size }}
{{- end }}
