apiVersion: v1
kind: Service
metadata:
  name: n8n-service
  namespace: {{ include "care.namespace" . }}
  labels:
    {{- include "care.n8n.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: n8n
  ports:
    - name: http
      port: {{ .Values.n8n.service.port }}
      targetPort: {{ .Values.n8n.port }}
